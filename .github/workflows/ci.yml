# =============================================================================
# Continuous Integration for biomimetic-lattice-pipeline.
#
# Runs on every push / pull-request to main, across Python 3.10-3.12:
#   1. install the package (core runtime + dev tools). The heavy FEA/CAD stack
#      (SfePy / CadQuery / gmsh, the conda cad_env/sfepy_env) is intentionally
#      NOT installed here -- those integration tests are marked `slow` and
#      skipped, since GitHub-hosted runners do not have those environments.
#   2. lint with ruff   3. check formatting with black   4. run the pytest suite.
#
# A green run therefore certifies: the package installs cleanly, imports, is
# lint- and format-clean, and its pure-Python design/analytics logic passes
# its tests on three Python versions.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, format & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # report every Python version's result, not just the first failure
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core + dev extras; heavy FEA stack excluded)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type-check (mypy; advisory baseline, non-blocking)
        # Runs and reports on every CI build; not yet gating while the codebase
        # is incrementally annotated (tightened to gating module-by-module).
        run: mypy -p biomimetic_pipeline
        continue-on-error: true

      - name: Tests (pytest; FEA-marked 'slow' tests skipped) with coverage
        run: pytest -m "not slow" --cov --cov-report=term-missing

  docker-build:
    name: Container image builds & runs
    runs-on: ubuntu-latest
    needs: lint-and-test          # only build the image once lint + tests are green
    steps:
      - uses: actions/checkout@v4
      - name: Build the core image
        run: docker build -t biomimetic-lattice-pipeline:ci .
      - name: Smoke-test (run the fast suite inside the container)
        run: docker run --rm biomimetic-lattice-pipeline:ci pytest -m "not slow"
